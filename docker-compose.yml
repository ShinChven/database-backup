services:
  backup:
    image: ghcr.io/shinchven/database-backup:latest
    pull_policy: always
    env_file: .env
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

  # ── Local dev helpers ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: backup_user
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    profiles: [dev]

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_USER: backup_user
      MYSQL_PASSWORD: devpassword
      MYSQL_DATABASE: users_db
    ports:
      - "3306:3306"
    profiles: [dev]

  # LocalStack for S3-compatible testing
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
    profiles: [dev]
