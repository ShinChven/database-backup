s3:
  bucket: my-backup-bucket
  prefix: db-backups          # Optional. Omit to write to bucket root.
  region: ap-southeast-1
  # endpoint_url: https://your-minio.example.com  # For MinIO / Cloudflare R2

local:
  path: /app/backups
  # keep: 7                   # Optional. If set, overrides the global default for local storage.

defaults:
  keep: 7                   # How many backup files to retain per schema

instances:
  - name: prod-postgres
    type: postgresql
    host: db.example.com
    port: 5432
    user: backup_user
    password: "${PG_PASSWORD}"   # Resolved from environment variable
    cron: "0 2 * * *"            # Default cron for all schemas in this instance
    keep: 14                     # Overrides global default for this instance
    schemas:
      - name: app_db
      - name: analytics_db
        cron: "0 4 * * *"        # Schema-level cron override
        keep: 5                  # Schema-level keep override

  - name: prod-mysql
    type: mysql
    host: mysql.example.com
    port: 3306
    user: backup_user
    password: "${MYSQL_PASSWORD}"
    cron: "30 2 * * *"
    schemas:
      - name: users_db
      - name: orders_db
