s3:
  bucket: my-backup-bucket
  prefix: db-backups        # Optional. Keys will be: {prefix}/{instance}/{schema}/{schema}_YYYYMMDD_HHMMSS.sql.gz
  region: ap-southeast-1
  # endpoint_url: https://your-minio.example.com   # Uncomment for MinIO / R2

defaults:
  keep: 7                   # How many backup files to retain per schema

instances:
  - name: prod-postgres
    type: postgresql
    host: db.example.com
    port: 5432
    user: backup_user
    password: "${PG_PASSWORD}"   # Resolved from environment variable
    cron: "0 2 * * *"            # Default cron for all schemas in this instance
    keep: 14                     # Overrides global default for this instance
    schemas:
      - name: app_db
      - name: analytics_db
        cron: "0 4 * * *"        # Schema-level cron override
        keep: 5                  # Schema-level keep override

  - name: prod-mysql
    type: mysql
    host: mysql.example.com
    port: 3306
    user: backup_user
    password: "${MYSQL_PASSWORD}"
    cron: "30 2 * * *"
    schemas:
      - name: users_db
      - name: orders_db
